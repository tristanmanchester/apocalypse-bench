run:
  name: 'default'
  # Dataset source of truth (V2):
  # - The per-category JSONL files in `data/question_bank/*.jsonl` ARE the source of truth. Edit them directly.
  # - See `data/question_bank/info.md` for the schema and conventions.
  # - Guardrail: `pnpm -s test -- test/dataset-validate.test.ts` enforces the V2 contract (ids, categories, 10-item rubrics, auto-fails).
  # - Optional human-readable export: `pnpm -s dataset:export` regenerates `docs/question-bank.md` from the JSONL.
  datasetPaths:
    - './data/question_bank'
  outDir: './runs'
  resume: true
  questionLimit: null
  categories: null
  maxBudgetUsd: null
  concurrency:
    candidate: 10
    judge: 10

candidate:
  # Candidate response token limit (output tokens).
  # Precedence: candidate.maxTokens -> models[].params.maxTokens -> routers.<router>.default.maxTokens
  maxTokens: 4000

judge:
  # router: 'openrouter'
  # model: 'google/gemini-3-flash-preview'
  # provider: 'google-ai-studio'
  # temperature: null
  # maxTokens: 16000
  # structured: true
  router: 'openrouter'
  model: 'xiaomi/mimo-v2-flash:free'
  provider: 'xiaomi/fp8'
  temperature: null
  maxTokens: 16000
  structured: true
  reasoning: true

routers:
  ollama:
    baseUrl: 'http://localhost:11434/api'
    apiKeyEnv: null
    default:
      temperature: 0.5
      # Default response token limit (output tokens) for requests routed via this router.
      maxTokens: 4000
      timeoutMs: 120000

  openrouter:
    baseUrl: 'https://openrouter.ai/api/v1'
    apiKeyEnv: 'OPENROUTER_API_KEY'
    headers:
      HTTP-Referer: 'https://github.com/yourname/apocalypse-bench'
      X-Title: 'apocalypse-bench'
    default:
      temperature: 0.5
      # Default response token limit (output tokens) for requests routed via this router.
      maxTokens: 4000
      timeoutMs: 120000

models:
  # - id: 'liquid/lfm-2.2-6b'
  #   router: 'openrouter'
  #   model: 'liquid/lfm-2.2-6b'
  #   provider: 'liquid'
  - id: 'liquid/lfm2-8b-a1b'
    router: 'openrouter'
    model: 'liquid/lfm2-8b-a1b'
    provider: 'liquid'
  - id: 'openai/gpt-oss-20b'
    router: 'openrouter'
    model: 'openai/gpt-oss-20b'
    provider: 'groq'
  # - id: 'openai/gpt-oss-120b'
  #   router: 'openrouter'
  #   model: 'openai/gpt-oss-120b'
  #   provider: 'cerebras'
  - id: 'nvidia/nemotron-nano-9b-v2'
    router: 'openrouter'
    model: 'nvidia/nemotron-nano-9b-v2'
    provider: 'deepinfra/bf16'
  - id: 'meta-llama/llama-3.1-8b-instruct'
    router: 'openrouter'
    model: 'meta-llama/llama-3.1-8b-instruct'
    provider: 'cerebras'
  # - id: 'google/gemma-3-4b-it'
  #   router: 'openrouter'
  #   model: 'google/gemma-3-4b-it'
  #   provider: 'deepinfra/bf16'
  - id: 'google/gemma-3-12b-it'
    router: 'openrouter'
    model: 'google/gemma-3-12b-it'
    provider: 'deepinfra/bf16'
  - id: 'qwen3-8b'
    router: 'openrouter'
    model: 'qwen/qwen3-8b'
    provider: 'fireworks'
