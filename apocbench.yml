run:
  name: 'default'
  # Dataset source of truth (V2):
  # - The per-category JSONL files in `data/question_bank/*.jsonl` ARE the source of truth. Edit them directly.
  # - See `data/question_bank/info.md` for the schema and conventions.
  # - Guardrail: `pnpm -s test -- test/dataset-validate.test.ts` enforces the V2 contract (ids, categories, 10-item rubrics, auto-fails).
  # - Optional human-readable export: `pnpm -s dataset:export` regenerates `docs/question-bank.md` from the JSONL.
  datasetPaths:
    - './data/question_bank'
  outDir: './runs'
  resume: true
  questionLimit: null
  categories: null
  maxBudgetUsd: null
  concurrency:
    candidate: 10
    judge: 10

candidate:
  # Candidate response token limit (output tokens).
  # Precedence: candidate.maxTokens -> models[].params.maxTokens -> routers.<router>.default.maxTokens
  maxTokens: 4000

judge:
  # router: 'openrouter'
  # model: 'google/gemini-3-flash-preview'
  # provider: 'google-ai-studio'
  # temperature: null
  # maxTokens: 16000
  # structured: true
  router: 'openrouter'
  model: 'xiaomi/mimo-v2-flash:free'
  provider: 'xiaomi/fp8'
  temperature: null
  maxTokens: 16000
  structured: true
  reasoning: true

routers:
  ollama:
    baseUrl: 'http://localhost:11434/api'
    apiKeyEnv: null
    default:
      temperature: 0.5
      # Default response token limit (output tokens) for requests routed via this router.
      maxTokens: 4000
      timeoutMs: 120000

  openrouter:
    baseUrl: 'https://openrouter.ai/api/v1'
    apiKeyEnv: 'OPENROUTER_API_KEY'
    headers:
      HTTP-Referer: 'https://github.com/yourname/apocalypse-bench'
      X-Title: 'apocalypse-bench'
    default:
      temperature: 0.5
      # Default response token limit (output tokens) for requests routed via this router.
      maxTokens: 4000
      timeoutMs: 120000

  # Generic OpenAI-compatible local/self-hosted endpoint.
  # Uncomment with a model entry below to run against LM Studio, vLLM, llama.cpp server,
  # or another server that exposes a /v1/chat/completions-compatible API.
  # openaiCompatible:
  #   baseUrl: 'http://127.0.0.1:1234/v1'
  #   apiKeyEnv: null
  #   # For authenticated proxies, use an env var name instead:
  #   # apiKeyEnv: 'LOCAL_OPENAI_API_KEY'
  #   default:
  #     temperature: 0.5
  #     maxTokens: 4000
  #     timeoutMs: 120000

# Optional local Wikipedia retrieval service. Direct runs do not require this block.
# Wiki candidate modes are configured per model with `candidateMode`.
# wiki:
#   enabled: true
#   service:
#     baseUrl: 'http://127.0.0.1:8765'
#     timeoutMs: 5000
#   corpus:
#     manifestId: 'wikipedia-markdown-local'
#     manifestPath: './data/wiki/full/manifest.json'
#   index:
#     manifestId: 'wikipedia-markdown-local'
#     manifestPath: './data/wiki/full/manifest.json'
#   limits:
#     searchTopK: 5
#     readMaxChars: 4000
#     contextMaxChars: 12000
#     maxToolCalls: 8
#     maxTurns: 6

models:
  # - id: 'liquid/lfm-2.2-6b'
  #   router: 'openrouter'
  #   model: 'liquid/lfm-2.2-6b'
  #   provider: 'liquid'
  - id: 'liquid/lfm2-8b-a1b'
    router: 'openrouter'
    model: 'liquid/lfm2-8b-a1b'
    provider: 'liquid'
    candidateMode: 'direct'
  # Repeat a hosted model with a wiki mode after enabling the wiki block above.
  # - id: 'liquid/lfm2-8b-a1b-rag-hybrid'
  #   router: 'openrouter'
  #   model: 'liquid/lfm2-8b-a1b'
  #   provider: 'liquid'
  #   candidateMode: 'rag-hybrid'
  - id: 'openai/gpt-oss-20b'
    router: 'openrouter'
    model: 'openai/gpt-oss-20b'
    provider: 'groq'
  # - id: 'openai/gpt-oss-120b'
  #   router: 'openrouter'
  #   model: 'openai/gpt-oss-120b'
  #   provider: 'cerebras'
  - id: 'nvidia/nemotron-nano-9b-v2'
    router: 'openrouter'
    model: 'nvidia/nemotron-nano-9b-v2'
    provider: 'deepinfra/bf16'
  - id: 'meta-llama/llama-3.1-8b-instruct'
    router: 'openrouter'
    model: 'meta-llama/llama-3.1-8b-instruct'
    provider: 'cerebras'
  # - id: 'google/gemma-3-4b-it'
  #   router: 'openrouter'
  #   model: 'google/gemma-3-4b-it'
  #   provider: 'deepinfra/bf16'
  - id: 'google/gemma-3-12b-it'
    router: 'openrouter'
    model: 'google/gemma-3-12b-it'
    provider: 'deepinfra/bf16'
  - id: 'qwen3-8b'
    router: 'openrouter'
    model: 'qwen/qwen3-8b'
    provider: 'fireworks'
