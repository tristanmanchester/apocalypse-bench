run:
  name: 'wiki-smoke'
  datasetPaths:
    - './data/question_bank'
  outDir: './runs'
  resume: true
  questionLimit: 2
  categories: null
  maxBudgetUsd: null
  concurrency:
    candidate: 3
    judge: 10

candidate:
  maxTokens: 4000

judge:
  router: 'openrouter'
  model: 'deepseek/deepseek-v4-flash'
  temperature: null
  maxTokens: 4096
  structured: true
  reasoning: true

routers:
  ollama:
    baseUrl: 'http://localhost:11434/api'
    apiKeyEnv: null
    default:
      temperature: 0.5
      maxTokens: 4000
      timeoutMs: 120000
  openrouter:
    baseUrl: 'https://openrouter.ai/api/v1'
    apiKeyEnv: 'OPENROUTER_API_KEY'
    headers:
      HTTP-Referer: 'https://github.com/yourname/apocalypse-bench'
      X-Title: 'apocalypse-bench'
    default:
      temperature: 0.5
      maxTokens: 4000
      timeoutMs: 120000

wiki:
  enabled: true
  service:
    baseUrl: 'http://127.0.0.1:8765'
    timeoutMs: 10000
  corpus:
    manifestId: '03873037ca5d577c9142d313ea437762828033188d2f06bbb58e5bb3704a1789'
    manifestPath: './data/wiki/full/manifest.json'
  index:
    # The Rust fixture/full service reports the same manifest id for corpus and index.
    manifestId: '03873037ca5d577c9142d313ea437762828033188d2f06bbb58e5bb3704a1789'
    manifestPath: './data/wiki/full/manifest.json'
  limits:
    searchTopK: 5
    readMaxChars: 4000
    contextMaxChars: 12000
    maxToolCalls: 8
    maxTurns: 6

models:
  - &lfm25_model
    id: 'lfm2.5-1.2b-thinking-direct'
    router: 'openrouter'
    model: 'liquid/lfm-2.5-1.2b-thinking:free'
    candidateMode: 'direct'
  - <<: *lfm25_model
    id: 'lfm2.5-1.2b-thinking-rag-bm25'
    candidateMode: 'rag-bm25'
  - <<: *lfm25_model
    id: 'lfm2.5-1.2b-thinking-rag-dense'
    candidateMode: 'rag-dense'
  - <<: *lfm25_model
    id: 'lfm2.5-1.2b-thinking-rag-hybrid'
    candidateMode: 'rag-hybrid'
  - <<: *lfm25_model
    id: 'lfm2.5-1.2b-thinking-agent-bm25'
    candidateMode: 'agent-bm25'
  - <<: *lfm25_model
    id: 'lfm2.5-1.2b-thinking-agent-dense'
    candidateMode: 'agent-dense'
  - <<: *lfm25_model
    id: 'lfm2.5-1.2b-thinking-agent-hybrid'
    candidateMode: 'agent-hybrid'
  - <<: *lfm25_model
    id: 'lfm2.5-1.2b-thinking-agent-wiki'
    candidateMode: 'agent-wiki'

  - &gemma26_model
    id: 'gemma-4-26b-a4b-it-direct'
